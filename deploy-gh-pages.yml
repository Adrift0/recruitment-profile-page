name: Build and deploy to gh-pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build
        env:
          # If you use any build-time secrets, set them as repo secrets and map here
          # EXAMPLE: VITE_API_URL: ${{ secrets.VITE_API_URL }}
          # Remove or edit the env block if not needed
          NODE_ENV: production

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/public
          publish_branch: gh-pages
          # optional: keep history by not forcing; remove if you want force push
          force_orphan: false
